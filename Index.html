<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Same Video 20 Times</title>

<style>
  body {
    margin: 0;
    background: black;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
  }

  .box {
    width: 100%;
    height: 250px;
  }

  iframe {
    width: 100%;
    height: 100%;
  }
</style>
</head>

<body>

<div class="container" id="container"></div>

<script>
  const container = document.getElementById("container");

  // 🔥 same video 20 times
  for (let i = 0; i < 20; i++) {
    const div = document.createElement("div");
    div.className = "box";

    div.innerHTML = `
      <iframe 
        src="https://www.youtube.com/embed/dlrerW23ebQ"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;

    container.appendChild(div);
  }
</script>

</body>
</html>
